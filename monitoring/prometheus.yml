global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'user-service'
    static_configs:
      - targets: ['host.docker.internal:3000']

  - job_name: 'product-service'
    static_configs:
      - targets: ['host.docker.internal:8081']
