apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shopeasy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: shopeasy/user-service:1.0.0
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shopeasy
spec:
  selector:
    app: user-service
  ports:
  - port: 3000
    targetPort: 3000
  type: NodePort
