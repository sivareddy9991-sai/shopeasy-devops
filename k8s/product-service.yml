apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopeasy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: shopeasy/product-service:1.0.0
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shopeasy
spec:
  selector:
    app: product-service
  ports:
  - port: 8081
    targetPort: 8081
  type: NodePort
